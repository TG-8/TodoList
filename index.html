<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shared TODO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f6f8;font-family:system-ui;color:#111827}.app{width:min(800px,100%);margin:auto;padding:20px}h1{margin-top:0}.top{display:flex;gap:10px;margin-bottom:12px}input,button{font:inherit;border-radius:12px;border:1px solid #d1d5db;padding:12px}button{cursor:pointer;border:none;font-weight:bold}.blue{background:#2563eb;color:white}.gray{background:#e5e7eb}.red{background:#fee2e2;color:#b91c1c}.green{background:#dcfce7;color:#166534}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.tab.active{background:#111827;color:white}.todo{display:grid;grid-template-columns:70px 1fr 50px;gap:8px;align-items:center;background:white;border-radius:16px;padding:10px;margin-bottom:10px}.todo input{width:100%}.hint{color:#6b7280;font-size:13px;margin-top:20px}
</style>
</head>
<body>
<main class="app">
<h1>TODOリスト</h1>
<div class="top"><input id="newListInput" placeholder="新しいリスト名"><button id="addListBtn" class="blue">リスト追加</button></div>
<div id="tabs" class="tabs"></div>
<div class="top"><input id="todoInput" placeholder="やること"><button id="addTodoBtn" class="blue">追加</button></div>
<div id="todoList"></div>
<p class="hint">完了を押すと削除。<br>複数端末で同期。</p>
</main>
<script>
const SUPABASE_URL = "https://pbyadwhnbocdnblqonki.supabase.co/rest/v1/";
const SUPABASE_ANON_KEY = "sb_publishable_zyatIpbaMCb6m3YkqjrXjA_3Ih4uivT";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const tabs = document.getElementById("tabs");
const todoList = document.getElementById("todoList");
const newListInput = document.getElementById("newListInput");
const addListBtn = document.getElementById("addListBtn");
const todoInput = document.getElementById("todoInput");
const addTodoBtn = document.getElementById("addTodoBtn");
let lists = [];
let todos = [];
let selectedListId = null;
init();
async function init() {
  await loadLists();
  addListBtn.onclick = addList;
  addTodoBtn.onclick = addTodo;
  setInterval(loadTodos, 3000);
}
async function loadLists() {
  const { data, error } = await client.from("todo_lists").select("*").order("created_at");
  if (error) return alert(error.message);
  lists = data || [];
  if (lists.length === 0) {
    await client.from("todo_lists").insert([{ name: "今日やる" }, { name: "仕事" }, { name: "買い物" }]);
    return loadLists();
  }
  if (!selectedListId) selectedListId = lists[0].id;
  renderLists();
  await loadTodos();
}
async function loadTodos() {
  if (!selectedListId) return;
  const { data, error } = await client.from("todos").select("*").eq("list_id", selectedListId).order("created_at");
  if (error) return alert(error.message);
  todos = data || [];
  renderTodos();
}
function renderLists() {
  tabs.innerHTML = "";
  lists.forEach((list) => {
    const button = document.createElement("button");
    button.textContent = list.name;
    button.className = "tab gray";
    if (list.id === selectedListId) button.classList.add("active");
    button.onclick = async () => {
      selectedListId = list.id;
      renderLists();
      await loadTodos();
    };
    tabs.appendChild(button);
  });
}
function renderTodos() {
  todoList.innerHTML = "";
  todos.forEach((todo) => {
    const row = document.createElement("div");
    row.className = "todo";
    const doneBtn = document.createElement("button");
    doneBtn.textContent = "完了";
    doneBtn.className = "green";
    doneBtn.onclick = async () => {
      await client.from("todos").delete().eq("id", todo.id);
      await loadTodos();
    };
    const input = document.createElement("input");
    input.value = todo.title;
    input.onchange = async () => {
      await client.from("todos").update({ title: input.value }).eq("id", todo.id);
    };
    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "×";
    deleteBtn.className = "red";
    deleteBtn.onclick = async () => {
      await client.from("todos").delete().eq("id", todo.id);
      await loadTodos();
    };
    row.append(doneBtn, input, deleteBtn);
    todoList.appendChild(row);
  });
}
async function addList() {
  const name = newListInput.value.trim();
  if (!name) return;
  await client.from("todo_lists").insert({ name });
  newListInput.value = "";
  await loadLists();
}
async function addTodo() {
  const title = todoInput.value.trim();
  if (!title) return;
  await client.from("todos").insert({ title, list_id: selectedListId });
  todoInput.value = "";
  await loadTodos();
}
</script>
</body>
</html>
